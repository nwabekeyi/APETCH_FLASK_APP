<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <button onclick="fetchPythonClass()">Fetch Python Class</button>
</head>
<body>
    
<h1>Test Page</h1>
    <script>

        const fetchPythonClass = async () => {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/class');
                const data = await response.json();
                console.log(data);
                alert(data.message);
            } catch (error) {
                console.error('Error fetching Python class:', error);
            }
        };

        fetchPythonClass();
    </script>
</body>
</html>
